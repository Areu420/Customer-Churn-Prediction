<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <style>
    body {
      background: #f4f6f9;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2 class="text-center mt-4">Customer Churn Prediction</h2>

    <form method="POST">

      <div class="card">
        <div class="row">

          <div class="col-md-3">
            <label>Gender</label>
            <select name="gender" class="form-control">
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Senior Citizen</label>
            <select name="SeniorCitizen" class="form-control">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Partner</label>
            <select name="Partner" class="form-control">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Dependents</label>
            <select name="Dependents" class="form-control">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Phone Service</label>
            <select name="PhoneService" class="form-control">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Multiple Lines</label>
            <select name="MultipleLines" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No phone service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Internet Service</label>
            <select name="InternetService" class="form-control">
              <option>DSL</option>
              <option>Fiber optic</option>
              <option>No</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Online Security</label>
            <select name="OnlineSecurity" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Online Backup</label>
            <select name="OnlineBackup" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Device Protection</label>
            <select name="DeviceProtection" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Tech Support</label>
            <select name="TechSupport" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Streaming TV</label>
            <select name="StreamingTV" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Streaming Movies</label>
            <select name="StreamingMovies" class="form-control">
              <option>Yes</option>
              <option>No</option>
              <option>No internet service</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Contract</label>
            <select name="Contract" class="form-control">
              <option>Month-to-month</option>
              <option>One year</option>
              <option>Two year</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Paperless Billing</label>
            <select name="PaperlessBilling" class="form-control">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Payment Method</label>
            <select name="PaymentMethod" class="form-control">
              <option>Electronic check</option>
              <option>Mailed check</option>
              <option>Bank transfer (automatic)</option>
              <option>Credit card (automatic)</option>
            </select>
          </div>

          <div class="col-md-3">
            <label>Tenure</label>
            <input type="number" name="tenure" class="form-control" required>
          </div>

          <div class="col-md-3">
            <label>Monthly Charges</label>
            <input type="number" step="0.01" name="MonthlyCharges" class="form-control" required>
          </div>

          <div class="col-md-3">
            <label>Total Charges</label>
            <input type="number" step="0.01" name="TotalCharges" class="form-control" required>
          </div>

        </div>
      </div>

      <button class="btn btn-primary btn-block mt-3">Predict</button>

    </form>

    {% if result %}
    <div class="card text-center">

      <h3>{{result}}</h3>

      <h5>Stay: {{stay_prob}}% | Churn: {{churn_prob}}%</h5>
      <h6 class="text-{{color}}">{{risk}}</h6>

      <div class="mt-3">
        <label>Stay Probability</label>
        <div class="progress">
          <div class="progress-bar bg-success" style="width: {{stay_prob}}%;">
            {{stay_prob}}%
          </div>
        </div>
      </div>

      <div class="mt-3">
        <label>Churn Probability</label>
        <div class="progress">
          <div class="progress-bar bg-danger" style="width: {{churn_prob}}%;">
            {{churn_prob}}%
          </div>
        </div>
      </div>

    </div>
    {% endif %}

  </div>

</body>

</html>
